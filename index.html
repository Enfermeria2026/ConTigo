<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ConTigo - Inicio</title>
</head>
<body>

    <div id="pantalla-carga">
        <img src="logo_contigo.png" class="logo" alt="Logo ConTigo">
        
        <div class="separador">
            <div class="linea"></div>
            <div class="corazon">♥</div>
            <div class="linea"></div>
        </div>

        <h1 class="texto-siempre">siempre.</h1>
        <p class="subtitulo">Tecnología para todas las edades.</p>
        
        <div class="puntos-carga">
            <div class="punto"></div>
            <div class="punto"></div>
            <div class="punto"></div>
        </div>
    </div>

    <div id="pantalla-login" class="pantalla-contenedor oculto">
        <img src="logo_contigo.png" class="logo" alt="Logo ConTigo">
        <h1>Iniciar Sesión</h1>
        <input type="text" id="login-nombre" placeholder="Nombre">
        <input type="text" id="login-id" placeholder="Identificador">
        <button id="btn-iniciar">Entrar</button>
        <button class="btn-secundario" onclick="window.location.href='registro.html'">Crear cuenta nueva</button>
    </div>

    <div id="modal-aviso" class="modal oculto">
        <div class="modal-contenido">
            <p id="texto-modal" style="font-size: 1.5rem;"></p>
            <button id="btn-cerrar-modal">Aceptar</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
