<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pagina">
        <img src="logo_contigo.png" class="logo-pequeno" alt="Logo">
        <h1>Registro</h1>
        <input type="text" id="reg-nombre" placeholder="Nombre">
        <input type="text" id="reg-apellidos" placeholder="Apellidos">
        <input type="date" id="reg-fecha">
        
        <div class="advertencia">
            <strong>⚠️ Importante:</strong> El identificador es tu clave. Anótalo donde puedas recordarlo.
        </div>
        
        <input type="text" id="reg-id" placeholder="Crea tu Identificador">
        <button id="btn-registrar">Registrarme</button>
        <button class="btn-secundario" onclick="window.location.href='index.html'">Volver</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
