<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="contenedor">
    <h1>Crear Cuenta</h1>
    <input type="text" id="reg-nombre" placeholder="Nombre">
    <input type="text" id="reg-apellidos" placeholder="Apellidos">
    <input type="date" id="reg-fecha">
    <div class="advertencia">⚠️ <strong>Importante:</strong> Anota tu identificador o compártelo con alguien de confianza.</div>
    <input type="text" id="reg-id" placeholder="Crea tu Identificador">
    <button id="btn-registrar">Registrarme</button>
    <button class="secundario" onclick="window.location.href='index.html'">Volver</button>
  </div>
  <div id="modal-aviso" class="modal oculto"><div class="modal-contenido"><p id="texto-modal"></p><button id="btn-cerrar-modal">Aceptar</button></div></div>
  <script type="module" src="app.js"></script>
</body>
</html>
