<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ConTigo - Registro</title>
</head>
<body>

    <div class="pantalla-contenedor">
        <img src="logo_contigo.png" class="logo" alt="Logo ConTigo">
        <h1>Crear Cuenta</h1>
        
        <input type="text" id="reg-nombre" placeholder="Nombre">
        <input type="text" id="reg-apellidos" placeholder="Apellidos">
        
        <label for="reg-fecha">Tu fecha de nacimiento:</label>
        <input type="date" id="reg-fecha">
        
        <input type="text" id="reg-id" placeholder="Crea tu Identificador">
        
        <div class="advertencia">
            <strong>⚠️ Consejo útil:</strong> El identificador es tu clave para entrar: anótalo donde puedasa o díselo a alguien de confianza. Usa algo que puedas recordar bien, comoe l nombre de algún familiar, de tu mascota o una ciudad.
        </div>
        
        <div class="fila-botones">
            <button id="btn-registrar">Registrarse</button>
            <button class="btn-secundario" onclick="window.location.href='index.html?nocarga=true'">Volver</button>
        </div>
    </div>

    <div id="modal-aviso" class="modal oculto">
        <div class="modal-contenido">
            <p id="texto-modal" style="font-size: 1.4rem; margin-bottom: 20px; text-align: left;"></p>
            <div id="modal-botones-confirmar" class="fila-botones oculto">
                <button id="btn-confirmar-si">Sí, son correctos</button>
                <button id="btn-confirmar-no" class="btn-gris">Modificar datos</button>
            </div>
            <button id="btn-cerrar-modal">Aceptar</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
